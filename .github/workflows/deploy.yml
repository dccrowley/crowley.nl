name: Deploy to crowley.nl

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via lftp
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -u crowleynl,"$DEPLOY_PASSWORD" sftp://ftp.crowley.nl <<EOF
          set sftp:auto-confirm yes
          set net:timeout 10
          mirror --reverse --delete --verbose \
            --exclude='^\.git/' \
            --exclude='^\.github/' \
            ./ /srv/home/crowleynl/domains/crowley.nl/htdocs/www/
          bye
          EOF
