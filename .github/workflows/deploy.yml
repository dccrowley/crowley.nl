name: Deploy to crowley.nl

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy via rsync
        run: |
          ssh-keyscan -p 22 ftp.crowley.nl >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -p 22" \
            ./ \
            crowleynl@ftp.crowley.nl:/srv/home/crowleynl/domains/crowley.nl/htdocs/www/ \
            --exclude='.git' \
            --exclude='.github'
